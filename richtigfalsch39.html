<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Richtig oder Falsch?</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
            --neutral-light: #f8f9fa;
            --text-color: #2b2d42;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #eef2f7;
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #1d3557;
            text-align: center;
        }

        .instruction {
            color: #6c757d;
            font-size: 1rem;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Statusanzeige oben */
        .progress-text {
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        /* Die Satz-Anzeige */
        .statement-card {
            background: var(--neutral-light);
            border: 2px solid #e2e8f0;
            padding: 35px 20px;
            border-radius: var(--border-radius);
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: #1d3557;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .statement-card.correct-feedback {
            border-color: var(--success-color);
            background-color: #e6f9f7;
        }

        .statement-card.incorrect-feedback {
            border-color: var(--error-color);
            background-color: #ffebee;
            animation: shake 0.4s ease;
        }

        /* Daumenfreundliche Buttons */
        .switch-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-choice {
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            color: white;
            transition: transform 0.15s, opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-true {
            background-color: var(--success-color);
        }

        .btn-false {
            background-color: var(--error-color);
        }

        @media (hover: hover) {
            .btn-choice:hover:not(:disabled) {
                transform: translateY(-2px);
                opacity: 0.9;
            }
        }

        .btn-choice:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Erklärungstext */
        .explanation-box {
            background-color: #f0f7ff;
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 25px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* Navigations- & Utility-Buttons */
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .btn-util {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-next {
            background-color: var(--primary-color);
            color: white;
            flex-grow: 1;
        }

        .btn-next:hover {
            background-color: var(--primary-hover);
        }

        .btn-restart {
            background-color: #6c757d;
            color: white;
        }

        .btn-restart:hover {
            background-color: #5a6268;
        }

        .btn-util:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
        }

        /* Animationen */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Правильно или нет?</h1>
    <p class="instruction">Prüfe den russischen Satz auf Grammatik- oder Logikfehler. Ist er korrekt oder fehlerhaft?</p>
    
    <div class="progress-text" id="progress-display">Satz 1 von 4</div>

    <!-- Kartenanzeige -->
    <div class="statement-card" id="statement-display">...</div>

    <!-- True / False Auswahl -->
    <div class="switch-container">
        <button class="btn-choice btn-true" id="btn-true">Richtig</button>
        <button class="btn-choice btn-false" id="btn-false">Falsch</button>
    </div>

    <!-- Erklärung (wird dynamisch eingeblendet) -->
    <div class="explanation-box" id="explanation-display"></div>

    <!-- Steuerung -->
    <div class="controls">
        <button class="btn-util btn-restart" id="restart-btn">Neustart</button>
        <button class="btn-util btn-next" id="next-btn" disabled>Weiter</button>
    </div>
</div>

<script>
    // Pool aus korrekten und inkorrekten Sätzen mit gezielten Erklärungen
    const taskData = [
        {
            text: "Кто это за машина?",
            isCorrect: false,
            hint: "Hier liegt der Fehler aus dem Originaltext! Eine „машина“ (Auto) ist unbelebt. Es muss daher zwingend mit „Что“ eingeleitet werden: „Что это за машина?“"
        },
        {
            text: "Что это у тебя за книга?",
            isCorrect: true,
            hint: "Absolut richtig! „книга“ (Buch) ist ein Gegenstand (unbelebt), weshalb die Einleitung mit „Что“ fehlerfrei ist."
        },
        {
            text: "Что это за человек?",
            isCorrect: false,
            hint: "Falsch! Da ein „человек“ (Mensch) belebt ist, verlangt die Umgangssprache hier das Fragewort „Кто“. Korrekt wäre: „Кто это за человек?“"
        },
        {
            text: "Это учебник по русскому языку.",
            isCorrect: true,
            hint: "Vollkommen korrekt! Dies ist die grammatikalisch einwandfreie Antwort auf die Frage nach dem Buch."
        }
    ];

    let currentIndex = 0;
    let shuffledTasks = [];

    const statementDisplay = document.getElementById('statement-display');
    const explanationDisplay = document.getElementById('explanation-display');
    const progressDisplay = document.getElementById('progress-display');
    const btnTrue = document.getElementById('btn-true');
    const btnFalse = document.getElementById('btn-false');
    const nextBtn = document.getElementById('next-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Mischer (Fisher-Yates)
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initQuiz() {
        currentIndex = 0;
        shuffledTasks = shuffle([...taskData]);
        loadTask();
    }

    function loadTask() {
        // Reset Interface
        btnTrue.disabled = false;
        btnFalse.disabled = false;
        nextBtn.disabled = true;
        explanationDisplay.style.display = 'none';
        statementDisplay.className = 'statement-card';
        
        nextBtn.textContent = currentIndex === shuffledTasks.length - 1 ? "Fertig" : "Weiter";
        progressDisplay.textContent = `Satz ${currentIndex + 1} von ${shuffledTasks.length}`;

        // Satz platzieren
        statementDisplay.textContent = shuffledTasks[currentIndex].text;
    }

    function handleAnswer(userChoice) {
        btnTrue.disabled = true;
        btnFalse.disabled = true;
        
        const currentTask = shuffledTasks[currentIndex];
        const isUserRight = (userChoice === currentTask.isCorrect);

        // Visuelles Feedback an der Karte verankern
        if (isUserRight) {
            statementDisplay.classList.add('correct-feedback');
            explanationDisplay.style.borderColor = 'var(--success-color)';
            explanationDisplay.innerHTML = `<strong>Richtig!</strong> <br>${currentTask.hint}`;
        } else {
            statementDisplay.classList.add('incorrect-feedback');
            explanationDisplay.style.borderColor = 'var(--error-color)';
            explanationDisplay.innerHTML = `<strong>Leider falsch.</strong> <br>${currentTask.hint}`;
        }

        // Erklärung immer einblenden
        explanationDisplay.style.display = 'block';
        nextBtn.disabled = false;
    }

    function handleNext() {
        if (currentIndex < shuffledTasks.length - 1) {
            currentIndex++;
            loadTask();
        } else {
            // Ende des Quizzes
            progressDisplay.textContent = "Beendet";
            statementDisplay.textContent = "🎉 Quiz abgeschlossen!";
            statementDisplay.className = 'statement-card correct-feedback';
            explanationDisplay.style.display = 'none';
            nextBtn.disabled = true;
        }
    }

    // Event Listener zuweisen
    btnTrue.addEventListener('click', () => handleAnswer(true));
    btnFalse.addEventListener('click', () => handleAnswer(false));
    nextBtn.addEventListener('click', handleNext);
    restartBtn.addEventListener('click', initQuiz);

    // Anwendung starten
    initQuiz();
</script>

</body>
</html>
