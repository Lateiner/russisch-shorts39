<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Belebt vs. Unbelebt</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
            --neutral-light: #f8f9fa;
            --text-color: #2b2d42;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #eef2f7;
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 650px;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #1d3557;
            text-align: center;
        }

        .instruction {
            color: #6c757d;
            font-size: 1rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .progress-text {
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        /* Wort-Anzeige (Die Karte) */
        .card-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            min-height: 110px;
        }

        .word-card {
            background: var(--neutral-light);
            border: 2px solid #e2e8f0;
            padding: 25px;
            border-radius: var(--border-radius);
            font-size: 2rem;
            font-weight: bold;
            color: #1d3557;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .word-card.correct-flash {
            background-color: #e6f9f7;
            border-color: var(--success-color);
            transform: scale(1.03);
        }

        .word-card.incorrect-flash {
            background-color: #ffebee;
            border-color: var(--error-color);
            animation: shake 0.4s ease;
        }

        /* Die Sortier-Körbe (Buttons) */
        .basket-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 480px) {
            .basket-grid {
                grid-template-columns: 1fr; /* Stapelt die Körbe untereinander auf kleinen Handys */
                gap: 15px;
            }
        }

        .basket-btn {
            background: #ffffff;
            border: 2px solid #cbd5e1;
            border-radius: var(--border-radius);
            padding: 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }

        .basket-btn .category {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--primary-color);
            display: block;
            margin-bottom: 5px;
        }

        .basket-btn .description {
            font-size: 0.95rem;
            color: #6c757d;
        }

        @media (hover: hover) {
            .basket-btn:hover:not(:disabled) {
                border-color: var(--primary-color);
                background-color: #f0f7ff;
                transform: translateY(-2px);
            }
        }

        .basket-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Feedback-Meldungen */
        .feedback {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 50px;
            margin-bottom: 15px;
        }

        .success-text { color: var(--success-color); }
        .error-text { color: var(--error-color); }

        /* Utility Steuerung */
        .controls {
            display: flex;
            justify-content: center;
        }

        .btn-restart {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            background-color: #6c757d;
            color: white;
            transition: background-color 0.2s;
        }

        .btn-restart:hover {
            background-color: #5a6268;
        }

        /* Animationen */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Кто или Что? (Kategorisierung)</h1>
    <p class="instruction">Ordne die russischen Wörter richtig zu. Welches Fragewort nutzt man für das eingeblendete Wort?</p>
    
    <div class="progress-text" id="progress-display">Wort 1 von 6</div>

    <!-- Aktuelles Wort -->
    <div class="card-container">
        <div class="word-card" id="word-display">...</div>
    </div>

    <!-- Zielbereiche (Körbe) -->
    <div class="basket-grid">
        <button class="basket-btn" id="btn-kto">
            <span class="category">Кто?</span>
            <span class="description">für Belebtes<br>(Personen / Tiere)</span>
        </button>
        <button class="basket-btn" id="btn-chto">
            <span class="category">Что?</span>
            <span class="description">für Unbelebtes<br>(Sachen / Objekte)</span>
        </button>
    </div>

    <!-- Direktes Feedback-Textfeld -->
    <div class="feedback" id="feedback-display"></div>

    <!-- Steuerung -->
    <div class="controls">
        <button class="btn-restart" id="restart-btn">Neustart</button>
    </div>
</div>

<script>
    // Vokabelpool direkt aus dem Transkript und der Anleitung
    const vocabularyPool = [
        { word: "книга", category: "chto", translation: "Buch" },
        { word: "машина", category: "chto", translation: "Auto" },
        { word: "учебник", category: "chto", translation: "Lehrbuch" },
        { word: "человек", category: "kto", translation: "Mensch" },
        { word: "учитель", category: "kto", translation: "Lehrer" },
        { word: "друг", category: "kto", translation: "Freund" }
    ];

    let currentIndex = 0;
    let shuffledVocab = [];
    let isLocked = false; // Verhindert Doppelklicks während der Flash-Animation

    const wordDisplay = document.getElementById('word-display');
    const feedbackDisplay = document.getElementById('feedback-display');
    const progressDisplay = document.getElementById('progress-display');
    const btnKto = document.getElementById('btn-kto');
    const btnChto = document.getElementById('btn-chto');
    const restartBtn = document.getElementById('restart-btn');

    // Fisher-Yates Mischer
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initGame() {
        currentIndex = 0;
        shuffledVocab = shuffle([...vocabularyPool]);
        btnKto.disabled = false;
        btnChto.disabled = false;
        feedbackDisplay.innerHTML = '';
        loadWord();
    }

    function loadWord() {
        isLocked = false;
        wordDisplay.className = 'word-card';
        
        if (currentIndex < shuffledVocab.length) {
            progressDisplay.textContent = `Wort ${currentIndex + 1} von ${shuffledVocab.length}`;
            wordDisplay.textContent = shuffledVocab[currentIndex].word;
        } else {
            // Spielende erreicht
            progressDisplay.textContent = "Beendet";
            wordDisplay.textContent = "🎉 Ausgezeichnet!";
            feedbackDisplay.innerHTML = '<span class="success-text">Du hast alle Wörter fehlerfrei kategorisiert!</span>';
            btnKto.disabled = true;
            btnChto.disabled = true;
        }
    }

    function handleSort(userCategory) {
        if (isLocked || currentIndex >= shuffledVocab.length) return;
        isLocked = true;

        const currentItem = shuffledVocab[currentIndex];
        const isCorrect = (userCategory === currentItem.category);

        if (isCorrect) {
            wordDisplay.classList.add('correct-flash');
            feedbackDisplay.innerHTML = `<span class="success-text">Richtig! <strong>${currentItem.word}</strong> (${currentItem.translation}) verlangt „${userCategory === 'kto' ? 'Кто' : 'Что'}“.</span>`;
            
            // Nach kurzer Verzögerung zum nächsten Wort wechseln
            setTimeout(() => {
                currentIndex++;
                loadWord();
            }, 1200);
        } else {
            wordDisplay.classList.add('incorrect-flash');
            feedbackDisplay.innerHTML = `<span class="error-text">Leider nicht richtig. <strong>${currentItem.word}</strong> (${currentItem.translation}) ist ${currentItem.category === 'kto' ? 'belebt (Кто)' : 'unbelebt (Что)'}. Probier es noch einmal!</span>`;
            
            // Animation zurücksetzen, damit der Schüler korrigieren kann
            setTimeout(() => {
                wordDisplay.className = 'word-card';
                isLocked = false;
            }, 500);
        }
    }

    // Event Listener zuweisen
    btnKto.addEventListener('click', () => handleSort('kto'));
    btnChto.addEventListener('click', () => handleSort('chto'));
    restartBtn.addEventListener('click', initGame);

    // Start der Anwendung
    initGame();
</script>

</body>
</html>
