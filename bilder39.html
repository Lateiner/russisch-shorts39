<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Bild-Satz-Zuordnung</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
            --neutral-light: #f8f9fa;
            --text-color: #2b2d42;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #eef2f7;
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #1d3557;
            text-align: center;
        }

        .instruction {
            color: #6c757d;
            font-size: 1rem;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Responsive Flashcard */
        .flashcard {
            background: var(--neutral-light);
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            width: 100%;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem; /* Großes Emoji */
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: transform 0.3s ease, border-color 0.3s;
        }

        .flashcard.correct {
            border-color: var(--success-color);
            background-color: #e6f9f7;
            transform: scale(1.02);
        }

        .flashcard.incorrect {
            border-color: var(--error-color);
            background-color: #ffebee;
            animation: shake 0.4s ease;
        }

        /* Optionen-Box */
        .options-grid {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid #cbd5e1;
            padding: 16px 20px;
            font-size: 1.15rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media (hover: hover) {
            .option-btn:hover:not(:disabled) {
                border-color: var(--primary-color);
                background-color: #f0f7ff;
                transform: translateY(-2px);
            }
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            border-color: var(--success-color);
            background-color: #e6f9f7;
            color: #0f5132;
            font-weight: bold;
        }

        .option-btn.incorrect {
            border-color: var(--error-color);
            background-color: #ffebee;
            color: #842029;
        }

        /* Audio-Icon Styling innerhalb des Buttons */
        .audio-icon {
            font-size: 1.2rem;
            opacity: 0.6;
        }

        /* Steuerung unten */
        .controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-next {
            background-color: var(--primary-color);
            color: white;
            flex-grow: 1;
        }

        .btn-next:hover {
            background-color: var(--primary-hover);
        }

        .btn-restart {
            background-color: #6c757d;
            color: white;
        }

        .btn-restart:hover {
            background-color: #5a6268;
        }

        .btn:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
        }

        /* Animationen */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Что это на картинке?</h1>
    <p class="instruction">Welcher Satz passt zum angezeigten Emoji? Klicke auf die richtige Option, um sie auch zu hören!</p>

    <!-- Dynamische Flashcard -->
    <div class="flashcard" id="card-display">🚗</div>

    <!-- Antwort-Optionen -->
    <div class="options-grid" id="options-container">
        <!-- Wird per JS generiert -->
    </div>

    <!-- Navigation -->
    <div class="controls">
        <button class="btn btn-restart" id="restart-btn">Neustart</button>
        <button class="btn btn-next" id="next-btn" disabled>Weiter</button>
    </div>
</div>

<script>
    // Aufgaben-Pool mit Emojis und passenden Distraktoren (Ablenkern)
    const cardData = [
        {
            emoji: "🚗",
            options: [
                { text: "Что это за машина?", correct: true },
                { text: "Что это у тебя за книга?", correct: false }
            ]
        },
        {
            emoji: "📘",
            options: [
                { text: "Кто это за человек?", correct: false },
                { text: "Что это у тебя за книга?", correct: true }
            ]
        },
        {
            emoji: "👨‍🏫",
            options: [
                { text: "Кто это за человек?", correct: true },
                { text: "Что это за машина?", correct: false }
            ]
        },
        {
            emoji: "📚",
            options: [
                { text: "Это учебник по русскому языку.", correct: true },
                { text: "Это новая модель Toyota.", correct: false }
            ]
        }
    ];

    let currentIndex = 0;
    let shuffledCards = [];

    const cardDisplay = document.getElementById('card-display');
    const optionsContainer = document.getElementById('options-container');
    const nextBtn = document.getElementById('next-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Fisher-Yates Mischer
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // Native Browser-Sprachausgabe (Russisch)
    function speakRussian(text) {
        if ('speechSynthesis' in window) {
            // Eventuell laufende Sprachausgaben stoppen
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.85; // Leicht verlangsamt für Schüler
            window.speechSynthesis.speak(utterance);
        }
    }

    function initGame() {
        currentIndex = 0;
        shuffledCards = shuffle([...cardData]);
        loadCard();
    }

    function loadCard() {
        nextBtn.disabled = true;
        nextBtn.textContent = currentIndex === shuffledCards.length - 1 ? "Fertig" : "Weiter";
        cardDisplay.className = 'flashcard';
        optionsContainer.innerHTML = '';

        const currentCard = shuffledCards[currentIndex];
        cardDisplay.textContent = currentCard.emoji;

        // Optionen für die aktuelle Karte mischen
        const options = shuffle([...currentCard.options]);

        options.forEach(opt => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerHTML = `<span>${opt.text}</span> <span class="audio-icon">🔊</span>`;
            button.addEventListener('click', () => handleSelection(button, opt.text, opt.correct));
            optionsContainer.appendChild(button);
        });
    }

    function handleSelection(selectedButton, text, isCorrect) {
        const buttons = optionsContainer.querySelectorAll('.option-btn');
        
        // Klicks sperren
        buttons.forEach(btn => btn.disabled = true);

        // Sprachausgabe triggern
        speakRussian(text);

        if (isCorrect) {
            selectedButton.classList.add('correct');
            cardDisplay.classList.add('correct');
        } else {
            selectedButton.classList.add('incorrect');
            cardDisplay.classList.add('incorrect');

            // Richtige Option aufdecken
            buttons.forEach(btn => {
                if (btn.textContent.includes(shuffledCards[currentIndex].options.find(o => o.correct).text)) {
                    btn.classList.add('correct');
                }
            });
        }

        nextBtn.disabled = false;
    }

    function handleNext() {
        if (currentIndex < shuffledCards.length - 1) {
            currentIndex++;
            loadCard();
        } else {
            cardDisplay.textContent = "🎉";
            cardDisplay.className = 'flashcard';
            optionsContainer.innerHTML = '<p style="text-align:center; font-size:1.2rem; font-weight:bold; padding:10px;">Отлично! Du hast alle Karten zugeordnet!</p>';
            nextBtn.disabled = true;
        }
    }

    nextBtn.addEventListener('click', handleNext);
    restartBtn.addEventListener('click', initGame);

    // Initialer Spielstart
    initGame();
</script>

</body>
</html>
