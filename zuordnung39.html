<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Zuordnung</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
            --neutral-light: #f8f9fa;
            --text-color: #2b2d42;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #eef2f7;
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #1d3557;
            text-align: center;
        }

        .instruction {
            color: #6c757d;
            font-size: 1rem;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Responsives Spalten-Layout */
        .matching-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .matching-grid {
                grid-template-columns: 1fr; /* Stapelt Spalten auf Smartphones */
                gap: 30px;
            }
            
            .column-header {
                display: none; /* Versteckt die Spaltentitel auf kleinen Bildschirmen */
            }
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .column-header {
            font-weight: bold;
            color: #1d3557;
            font-size: 1.1rem;
            margin-bottom: 5px;
            text-align: center;
        }

        /* Interaktive Kacheln */
        .item {
            background: var(--neutral-light);
            border: 2px solid #e2e8f0;
            padding: 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            min-height: 60px;
        }

        /* Hover-Effekt nur auf Geräten mit Maus-Zeiger */
        @media (hover: hover) {
            .item:hover:not(.matched):not(.selected) {
                border-color: var(--primary-color);
                background: #f0f7ff;
                transform: translateY(-2px);
            }
        }

        .item.selected {
            border-color: var(--primary-color);
            background-color: #e0f0ff;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.3);
        }

        .item.matched {
            border-color: var(--success-color);
            background-color: #e6f9f7;
            color: #0f5132;
            cursor: default;
            pointer-events: none;
        }

        .item.error {
            border-color: var(--error-color);
            background-color: #ffebee;
            animation: shake 0.4s ease;
        }

        /* Feedback-Bereich */
        .feedback {
            text-align: center;
            min-height: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .success-message {
            color: var(--success-color);
            animation: pop 0.3s ease;
        }

        /* Neustart Button */
        .btn-restart {
            align-self: center;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }

        .btn-restart:hover {
            background-color: var(--primary-hover);
        }

        .btn-restart:active {
            transform: scale(0.98);
        }

        /* Animationen */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Что это за... ?</h1>
    <p class="instruction">Tippe eine Frage an und wähle danach die passende russische Antwort aus.</p>

    <div class="matching-grid">
        <!-- Linke Spalte: Fragen -->
        <div class="column" id="questions-column">
            <div class="column-header">Fragen (Вопросы)</div>
        </div>

        <!-- Rechte Spalte: Antworten -->
        <div class="column" id="answers-column">
            <div class="column-header">Antworten (Ответы)</div>
        </div>
    </div>

    <div class="feedback" id="feedback-area"></div>
    
    <button class="btn-restart" id="restart-btn">Neustart (Перезапустить)</button>
</div>

<script>
    const dataset = [
        { id: 1, question: "Что это у тебя за книга?", answer: "Это учебник по русскому языку." },
        { id: 2, question: "Что это за machine?", answer: "А ты не знаешь? Это новая модель Toyota." },
        { id: 3, question: "Кто это за человек?", answer: "Это наш новый учитель." }
    ];

    let selectedQuestion = null;
    let selectedAnswer = null;
    let matchesFound = 0;

    const questionsColumn = document.getElementById('questions-column');
    const answersColumn = document.getElementById('answers-column');
    const feedbackArea = document.getElementById('feedback-area');
    const restartBtn = document.getElementById('restart-btn');

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function clearBoard() {
        // Entferne alte Elemente, behalte aber die Header-Divs
        const qHeader = questionsColumn.querySelector('.column-header');
        const aHeader = answersColumn.querySelector('.column-header');
        
        questionsColumn.innerHTML = '';
        answersColumn.innerHTML = '';
        
        if (qHeader) questionsColumn.appendChild(qHeader);
        if (aHeader) answersColumn.appendChild(aHeader);
        
        feedbackArea.innerHTML = '';
    }

    function initGame() {
        clearBoard();
        selectedQuestion = null;
        selectedAnswer = null;
        matchesFound = 0;

        const shuffledQuestions = shuffle([...dataset]);
        const shuffledAnswers = shuffle([...dataset]);

        shuffledQuestions.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = item.question;
            div.dataset.id = item.id;
            div.addEventListener('click', () => handleSelect(div, 'question'));
            questionsColumn.appendChild(div);
        });

        shuffledAnswers.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.textContent = item.answer;
            div.dataset.id = item.id;
            div.addEventListener('click', () => handleSelect(div, 'answer'));
            answersColumn.appendChild(div);
        });
    }

    function handleSelect(element, type) {
        if (element.classList.contains('matched')) return;

        if (type === 'question') {
            if (selectedQuestion) selectedQuestion.classList.remove('selected');
            selectedQuestion = element;
            selectedQuestion.classList.add('selected');
        } else {
            if (selectedAnswer) selectedAnswer.classList.remove('selected');
            selectedAnswer = element;
            selectedAnswer.classList.add('selected');
        }

        if (selectedQuestion && selectedAnswer) {
            checkMatch();
        }
    }

    function checkMatch() {
        const qId = selectedQuestion.dataset.id;
        const aId = selectedAnswer.dataset.id;

        if (qId === aId) {
            selectedQuestion.className = 'item matched';
            selectedAnswer.className = 'item matched';
            matchesFound++;
            
            resetSelection();

            if (matchesFound === dataset.length) {
                feedbackArea.innerHTML = '<span class="success-message">Отлично! Du hast alle Paare richtig zugeordnet! 🎉</span>';
            }
        } else {
            const wrongQ = selectedQuestion;
            const wrongA = selectedAnswer;

            wrongQ.classList.add('error');
            wrongA.classList.add('error');

            resetSelection();

            setTimeout(() => {
                if (!wrongQ.classList.contains('matched')) wrongQ.classList.remove('error');
                if (!wrongA.classList.contains('matched')) wrongA.classList.remove('error');
            }, 400);
        }
    }

    function resetSelection() {
        if (selectedQuestion) selectedQuestion.classList.remove('selected');
        if (selectedAnswer) selectedAnswer.classList.remove('selected');
        selectedQuestion = null;
        selectedAnswer = null;
    }

    // Event Listener für den Neustart-Button
    restartBtn.addEventListener('click', initGame);

    // Erster Start des Spiels
    initGame();
</script>

</body>
</html>
