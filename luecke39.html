<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Lückentext</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
            --neutral-light: #f8f9fa;
            --text-color: #2b2d42;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #eef2f7;
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #1d3557;
            text-align: center;
        }

        .instruction {
            color: #6c757d;
            font-size: 1rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .cloze-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Responsive Satz-Karten */
        .sentence-card {
            background: var(--neutral-light);
            border: 2px solid #e2e8f0;
            padding: 20px;
            border-radius: var(--border-radius);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.2s;
        }

        .sentence-line {
            font-size: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        /* Stylisches & responsives Dropdown */
        .cloze-select {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 6px 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            background-color: white;
            color: var(--text-color);
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            min-width: 90px;
            text-align: center;
        }

        .cloze-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        /* Validierungs-Zustände */
        .sentence-card.correct {
            border-color: var(--success-color);
            background-color: #e6f9f7;
        }

        .sentence-card.incorrect {
            border-color: var(--error-color);
            background-color: #ffebee;
        }

        .cloze-select.correct {
            border-color: var(--success-color);
            background-color: #e6f9f7;
            color: #0f5132;
        }

        .cloze-select.incorrect {
            border-color: var(--error-color);
            background-color: #ffebee;
            color: #842029;
        }

        .explanation {
            font-size: 0.95rem;
            color: #4a5568;
            font-style: italic;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* Buttons-Bereich */
        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: var(--border-radius);
            cursor: pointer;
            border: none;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-restart {
            background-color: #6c757d;
            color: white;
            box-shadow: 0 4px 6px rgba(108, 117, 125, 0.2);
        }

        .btn-restart:hover {
            background-color: #5a6268;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .feedback-summary {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            min-height: 30px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Что или Кто?</h1>
    <p class="instruction">Wähle für jede Lücke das richtige Fragewort aus: „Что“ für Unbelebtes (Sachen) oder „Кто“ für Belebtes (Personen/Tiere).</p>

    <div class="cloze-list" id="cloze-container">
        <!-- Wird dynamisch per JS befüllt -->
    </div>

    <div class="actions">
        <button class="btn btn-submit" id="submit-btn">Überprüfen</button>
        <button class="btn btn-restart" id="restart-btn">Neustart</button>
    </div>

    <div class="feedback-summary" id="summary-area"></div>
</div>

<script>
    // Aufgaben-Pool mit Erklärungen
    const taskPool = [
        { id: 1, correct: "Что", rest: "это у тебя за книга?", hint: "„книга“ (Buch) ist ein unbelebtes Objekt, daher verwendet man „Что“." },
        { id: 2, correct: "Что", rest: "это за машина?", hint: "„машина“ (Auto) ist unbelebt, deshalb fragt man mit „Что“." },
        { id: 3, correct: "Кто", rest: "это за человек?", hint: "„человек“ (Mensch) ist ein Lebewesen, folglich ist „Кто“ richtig." },
        { id: 4, correct: "Кто", rest: "это за учитель?", hint: "„учитель“ (Lehrer) ist eine Person, also nutzt man „Кто“." }
    ];

    const container = document.getElementById('cloze-container');
    const submitBtn = document.getElementById('submit-btn');
    const restartBtn = document.getElementById('restart-btn');
    const summaryArea = document.getElementById('summary-area');

    // Array zum Mischen der aktuellen Aufgaben
    let activeTasks = [];

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initExercise() {
        container.innerHTML = '';
        summaryArea.innerHTML = '';
        submitBtn.disabled = false;
        
        // Aufgaben klonen und mischen
        activeTasks = shuffle([...taskPool]);

        activeTasks.forEach((task, index) => {
            const card = document.createElement('div');
            card.className = 'sentence-card';
            card.id = `card-${index}`;

            const line = document.createElement('div');
            line.className = 'sentence-line';

            // Dropdown-Auswahlbox erstellen
            const select = document.createElement('select');
            select.className = 'cloze-select';
            select.id = `select-${index}`;
            
            // Standardoption
            const defaultOpt = document.createElement('option');
            defaultOpt.value = "";
            defaultOpt.textContent = "___";
            select.appendChild(defaultOpt);

            // Antwortoptionen
            const optChto = document.createElement('option');
            optChto.value = "Что";
            optChto.textContent = "Что";
            select.appendChild(optChto);

            const optKto = document.createElement('option');
            optKto.value = "Кто";
            optKto.textContent = "Кто";
            select.appendChild(optKto);

            // Satz-Rest anhängen
            const textSpan = document.createElement('span');
            textSpan.textContent = task.rest;

            line.appendChild(select);
            line.appendChild(textSpan);

            // Erklärungstext anhängen (wird erst nach Abgabe sichtbar)
            const hintDiv = document.createElement('div');
            hintDiv.className = 'explanation';
            hintDiv.id = `hint-${index}`;
            hintDiv.textContent = task.hint;

            card.appendChild(line);
            card.appendChild(hintDiv);
            container.appendChild(card);
        });
    }

    function checkAnswers() {
        let correctCount = 0;
        let unanswered = false;

        activeTasks.forEach((task, index) => {
            const select = document.getElementById(`select-${index}`);
            const card = document.getElementById(`card-${index}`);
            const hint = document.getElementById(`hint-${index}`);
            const userAnswer = select.value;

            if (userAnswer === "") {
                unanswered = true;
                return;
            }

            // Validierung zurücksetzen
            select.classList.remove('correct', 'incorrect');
            card.classList.remove('correct', 'incorrect');

            if (userAnswer === task.correct) {
                select.classList.add('correct');
                card.classList.add('correct');
                correctCount++;
            } else {
                select.classList.add('incorrect');
                card.classList.add('incorrect');
            }

            // Erklärung einblenden
            hint.style.display = 'block';
        });

        if (unanswered) {
            summaryArea.style.color = 'var(--error-color)';
            summaryArea.textContent = 'Bitte fülle alle Lücken aus!';
            return;
        }

        // Abschluss-Feedback anzeigen
        if (correctCount === activeTasks.length) {
            summaryArea.style.color = 'var(--success-color)';
            summaryArea.textContent = `Perfekt! ${correctCount} von ${activeTasks.length} richtig gelöst! 🎉`;
        } else {
            summaryArea.style.color = 'var(--text-color)';
            summaryArea.textContent = `${correctCount} von ${activeTasks.length} richtig. Schau dir die Hinweise an!`;
        }
    }

    submitBtn.addEventListener('click', checkAnswers);
    restartBtn.addEventListener('click', initExercise);

    // Initialer Start
    initExercise();
</script>

</body>
</html>
